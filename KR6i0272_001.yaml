body:
  text: 西晉月氏三藏竺法護譯得普智心品第一聞如是一時佛遊王舍國鷲山之頂與大比丘衆千二百五十人諸菩薩八千人俱于時世尊廣為無數百千諸衆而所圍繞敷演説法爾時有龍王名阿耨達晉言無熱宿造德本遵修菩薩堅住大乘行六度無極以具滿相勤救衆生化道無極曾事九十六億諸佛積纍功德不可稱數執權方便普現五道拔諸愚冥使修菩薩無欲之行懷慈四等濟度一切傷愍罪類故現為龍化龍億數使免殃行自處于池率諸眷屬八千萬衆又將婇女十四萬人周匝導從調作倡伎其音和雅乘龍感動協懷威德神變自由齎衆雜花奉最妙香擎持幡蓋而詣世尊至輒稽首敬問如來尋以所持香華雜寶繒綵幡蓋重調音樂欣心敬意與衆眷屬及諸婇女俱進詣佛則前長跪肅然叉手而白佛言欲問如來無著平等最正覺菩薩所應行道當云何唯蒙聽許乃能敢問爾時世尊告龍王曰恣汝所問勿疑勿難所欲如來至真等正覺當隨敷散解釋汝心時阿耨達得為神尊所聽質疑心益欣悅而白佛言天師最尊人中聖導猛如師子感變無量吾問如來普及衆生亦為菩薩大士之故為世師者拔過俗法志行清淨明盡因緣濟度群生作無請友心普安救誘育立之執持無畏十種力進伏衆魔降諸外道心無穢行被堅金剛大德之鎧志不有惓積德因緣不可計量施戒忍進定智已備心等一切蠲除雜相棄捐二見以越智度解因緣法已入深奧難極之要去離聲聞緣一覺念不捨大乘一切智心意行堅強常得自在身淨無垢暉曜明徹志若虛空無數諸劫意不惓者逮獲總持降除貪穢自大貢高等如逝者空無相願以過如住夢幻影響野馬水月於斯諸法等解不動重三寶教奉而敬之轉其法輪而無所礙欣悅信樂皆自得之如優曇花億世希出志靜安獨普有具相宿樹恭恪明賢大士尊修上義法住若此為彼正士故問如來唯願如來至真等正覺解説菩薩大士所行得遊法門入金剛德果達深妙使其修應獲總持場以四諦行順化聲聞使解要真導衆緣覺靜起因緣獎以一心使等正覺欲達諸法當入大乘曉入大乘能伏魔場散棄疑結過度罪惱普知衆生意志所行積最辨達布演諸法隨一切願化示所欲善哉世尊如來無著平等正覺廣為賢明大士之故普弘演説使諸菩薩得致智力降己自大得法上力曉解央行不有所造使得施力所有無惜惠不望報使得戒力等除衆罪而過諸願使得忍力於諸苦法受生之處身命無惜得精進力積衆德本志常無惓使得定力善寂居靜解定要行使得慧力而過邪見疑冥昧昧曉權方便濟度衆生明了勸助具達五通天眼無限徹聽知心神足明宿以此遊樂果大辨才辨才句義無盡不斷便得總持志無恍忽令逮海印三昧正定進隨普智果同一味得佛志定習樂通行永常奉尊而無障蔽逮法志定勉進定意長久聞法都無限礙崇衆志定普令一切奉不退衆得施志定俗貨法施不有遺惜具足於戒行念靜定使速得佛心而無忘升天志定常念兜述一生補處志樂菩薩清高之行爾時龍王質疑畢訖悅心怡懌重以讚頌啓問世尊大仁願説現世義菩薩德行所當入內性志操所應修興發何道行云何順導以慈行入悲意以度衆護濟念弘化定智使清淨願垂哀傷而普説誘衆止意及意斷根力神足行如是演道七覺散示衆願説彼德所應奉施調撿戒德具足忍力普行及精進慧志因緣轉無量云何度彼蒙説之辨才通達勉愚冥志行詳審常清淨諸起生者即覺知唯願為諸菩薩説欣悅之德有歡豫聖種七財是行最樂遊間居及修靜唯蒙慈尊廣度説辨才行具云何得深致總持永安住弘法要説常無斷聞輒奉行終不忘寂滅清淨而行觀覺意深邃智廣博其慧難究德無邊解行云何應菩薩制持魔力與怒意毀壞外道衆邪類勇德難動若大山月明至遊弘説之曉空無想性所在解了野馬及幻法夢想體像計皆無唯願世尊指示説於是世尊告龍王曰善哉善哉快甚無比乃自發心啓疑如來今汝所問承宿功德已顯大悲為衆志友不勞生死弗斷三寶王之質疑用是故也聞以諦聽受而思惟吾當廣説菩薩大士應所修行彼此無限果最要法時龍王言大善世尊願樂思聽聞輒受行宣布十方勸進無惓於是世尊答龍王曰有一法行菩薩應者相好備具得諸佛法何謂為一造起道意不捨衆生是謂一行致諸佛法又有三十二事得普智心當勤樂行專意守習何謂三十二御修內性執上最志升行大慈堅固大悲志慕無厭發於精進仂具猛勵而德強力又踰踊勢安靜無煩為衆忍任習近善友專行法事執御權化施備忍行樂於撿戒諂想已無滅斷偽侫言行相應志存反復常有愧色內自慚恥已調怡悅根行至信意而制御得持功德志遠小道樂弘大乘行觀一切三寶之事使其不斷是謂龍王三十二法菩薩應此逮普智心又復龍王有十六事進增普智顯力弘軌何謂十六進普智耶施行衆濟具戒無缺忍應調忍果上精進致定諸行已具智慧信行悉足供事如來遊靜樂間備六堅法有最十善飾身口意德具操行知足樂靜身三勸彼修勝定觀諸德得備是謂十六行法之事應相祥福演大智心顯持佛世流化自由又復龍王其普智心以二十二事而除邪徑以其大乘志修普智何謂二十二事行過聲聞緣一覺意已下貢高無我自大消去諂事抑俗雜言遠棄非戒拔恚怒根免却魔事除去蔽礙不章師訓耗滅罪除省己切惻不論彼非習離惡友遠逆良善去非六度又逝貪惜戒無不消已棄諍訟而離懈怠於迷自正捨諸無知斷去無便却去惡行是謂菩薩普智釋除二十二邪軌速應權慧永無懈退又復龍王二十二踊事進順隨行得普智心而不可當諸魔波旬及魔官屬并與外道降而却之何謂二十二踊過戒事踊過於定亦踊過智而過慧行踊過權化亦過大慈踊過大悲以要言之過空相願我人壽命過離衆見及發因緣過心自淨承覺神聖過於識念應不應見過大金剛堅固之行是謂龍王菩薩所行二十二踊法致普智心一切衆魔及諸魔身并邪外道不得自在無敢當者悉降却之又復龍王其普智心依二行處致普智心何謂為二如其所言修應行處諸功德本觀道行處是謂二事普智行處復有二事其普智心而不可毀何謂二事在於衆生無增異心於諸殃行濟以大悲是謂二事普智無毀又復龍王其普智心有二重法而無過者生死之黨及衆聲聞并諸緣覺無能勝踰何謂為二執權方便深行智慧是為二事普智重法又有二事休普智心何謂為二處毀無疑滯結之心在在不安樂俗諸樂是謂二事休普智心復有二事護普智心何謂為二不志聲聞緣覺行地觀覩大乘至美之德是謂二事護普智心復有二事妨普智心何謂為二志常多侫內性懷諂是即二事妨普智心復有二事不妨普智何謂為二專修直信行于無諂是謂二事不妨普智又有四事蓋普智心何謂為四數亂正法於諸菩薩賢明達士亦不奉敬常無恭恪不覺魔事是為四事蓋普智心復有四事於普智心而無其蓋何謂為四護持正法謙恭受聽尊重菩薩視若世尊常覺魔事是為四事普智無蓋又有五事致普智心何謂為五所行無望於生死漏用戒德故不捨一切以大悲故憎愛無二身命施故財利周惠供事法故是為五事得致普智復有五事進普智心何謂為五習善知識不患生死志遠無益去非時心求諸佛智是為五事進普智心復有五事在普智心過諸聲聞緣覺一覺念何謂為五過聲聞脫過緣覺脫過衆智心過諸吾我又過習結是為五事過諸行法復有五事於普智心而有其悅何謂為五悅過惡道悅審普智悅具覺慧悅戒無厭悅解衆行是為五事普智之悅復有五事發普智心得五力助不溺生死何謂為五無其怒恨用忍力故能滿諸願用德力故降己自大以智力故勤勢廣聞用慧力故過衆恐怯無畏力故是為五事致諸助力復有五事在普智心得五清淨何謂為五體衆穢行淨諸墮者因緣諸根無惑淨之隨順諸時以觀淨之行治於等權道淨之一切諸法化轉淨之是為五事普智清淨復有五事得普智明何謂為五明解無欲明己彼心明於五句明達慧行明眼無礙是為五事致普智明復有五事廣普智心何謂為五以其五種五根五莖五枝五葉五花五果何謂為五種日修志修而淨內性等觀人物求習脫行弘於權變是為五種何謂五根以大慈悲德本無厭勸進衆生使免小乘不志餘道是為五根何謂五莖曉權方便慧度無極示導人民護持正法等觀喜怒是為五莖何謂五枝施度無極戒度無極忍度無極進度無極定度無極是為五枝何謂五葉樂進聞戒求處空靜常志出家心安佛種所遊無礙是為五葉何謂五花得文相具積滿德故衆好繡備種種施故七覺財具心無雜故致有顯辨不蔽法故深達總持聞無忘故是為五花何謂五果升致戒果已得度果達緣覺果又得菩薩不退轉果獲佛法果是曰五果斯謂龍王菩薩七五三十五事廣普智樹道寶行也修應之者得佛不難佛告龍王其有菩薩欲受持此普智心樹深妙明顯要行句者當勤加習普智寶樹如是龍王吾視一切諸法功德莫不由斯寶樹奧義諸發無上正真道意悉皆因是普智寶樹至要句也譬如龍王選植樹種知此已致樹之根莖枝葉花果而甚盛茂也如是龍王其有能受普智心種斯已得致諸佛賢聖最上慧法三十七品是故龍王欲入普智所行功德欲轉法輪當受持此精修誦讀專心習行廣為一切宣傳布演如是龍王勤受學此當佛説斯普智心品法語之時諸龍衆中七萬二千皆發無上正真道意龍王太子及諸婇女萬四千人悉皆逮得柔順法忍五千菩薩承宿德本悉得法忍時阿耨達并餘龍王及諸眷屬自乘神力踊升虛空興香之雲忽便普布調和美香及末栴檀微雨如來及衆會上又化琦妙珠交露蓋遍覆王舍一國境界而悉歡悅於上歌詠至真如來積祚巍巍聖德無量列住雲日各現半身光文虛空一切衆會莫不見者也清淨道品第二於是龍王復白佛言甚未曾有唯然世尊乃若如來博為衆生説道俗及心普智心行德所應又唯世尊如來無著平等正覺願演散説菩薩之行修應清純明賢所由得道清淨使其終已長久無垢不中有懈無惓弗退至得十力四無所畏而得具足諸佛之法爾時世尊告阿耨達善哉龍王勤思念行吾當廣説菩薩大士清淨道品阿耨達曰甚善世尊幸蒙授教唯願説之於時聖尊告龍王曰菩薩行有八直正道當勤受持何謂為八六度無極道恩行之道得五通道行四等道及八正道等衆生道三脫門道入法忍道如此龍王是為菩薩八正行道何謂菩薩度無極道度無極道者諸所布施勸彼普智何則然者不以無勸施成普智其行勸助於德本者斯得施度無極名目又及行戒忍進定智亦以勸助彼普智心乃得慧度無極名目是曰菩薩度無極道恩行道者含受衆生何則然者以彼菩薩演示法度菩薩行恩含受一切覆以四恩廣為説法而使衆生順受戒化是四恩道神足道者覩諸佛土天眼徹視見衆一切生者終者又見十方諸佛世尊弟子圍繞悉見如是於諸佛土以其天眼應當所採而採受之又其天耳聽諸佛言聞輒受行在於衆生及諸類人而皆明曉悉了知盡為隨説法得識宿命不忘前世所作功德又具神足遊過無數諸佛國土應以神足當得度者輒弘神足而度脫之是神足應道又何謂為四等行道其隨修淨梵志中者并及諸餘色像天子知彼意行隨順化日斯則慈悲是為喜護建立以道使彼應度此謂菩薩四等行道其八正道普悉行之聲聞所由緣覺依因大乘亦然是謂賢聖八直正道何謂心等諸衆生道當為此興不為是興為斯可説為此不應是有賢德此非福人斯為盡應此復不應行等菩薩盡除此意是謂心等諸衆生道何謂菩薩三脫門道得致以空斷諸妄見以其無相除衆念想應與不應以其無願永離三界是謂菩薩三脫門道何謂得致法忍之道受拜菩薩菩薩自覺行應於忍得為諸佛世尊所決授者無上正真道意是謂菩薩不起忍道菩薩致此八直正道弘化流布權導無礙時佛説是八正道已二萬四千天龍及人悉逮應此八道行也若是龍王菩薩以此八直正道等塗一歸用無等故莫有能與菩薩比者亦無其侶獨步三界靜一心時修致慧行應當所得已自果之明達諸法而如本無斯謂如來是曰龍王八正之道為彼一切凡諸若干衆生所行興種種説而此要説等同一向以無望説歸未至説也云何於此道清淨耶曰道無垢用無塵故是道無瑕本無念故是道無冥慧照明故是道無著本清淨故道常無生無所滅故道如永無本無有故道無漏穢三界淨故是道寂然過凡行故道無可至無有去故道無所來無從來故道恆無住過諸欲故道無所處過衆見故道無勝者過諸魔故道大弘覆外道不及故道永離妄自大者故道無所容不修入故是道極遠用希望故道為永離過愚夫行故道可果致修行者故是道夷易樂勤行故道極平坦住正見故是道無妨修無毀故是道無礙等正行故是道無垢三毒淨故是道清淨終無著故是謂菩薩道之清淨若是菩薩於清淨道務進勤修又應行者彼於法性已悉清淨得淨我性亦以而過法性淨故則數性淨數性淨故無數性淨無數淨故得三界淨三界淨故眼識性淨眼識淨故意識性淨意識淨故得空性淨空性淨故諸法性淨用是淨故則諸法等等淨如空空等淨故得衆生淨以諸淨故便無其二亦不著二無二淨故則道清淨以斯言之清淨道也彼無衆念亦不念道諸念悉淨若如泥洹於彼永無是謂無念應無所念無念道者亦無識念其道都無心意識行以此言之清淨道也説是清淨道品法時二萬天人皆得法忍時阿耨達復白佛言云何世尊菩薩大士修是清淨而應向道聖尊告曰如是龍王菩薩大士欲行斯清淨道意者當曉淨行亦使其身口意清淨何謂身淨己身已空解諸身空身之寂靜解諸身寂身之已脫解諸身脫身之怠慢解諸身怠身之如影解諸身影是謂菩薩清淨道也又云身淨身行無生其有生死觀於無生彼以無生而等生死則其知身亦曉身行何謂身行去來生法來無盡法見在景法終無盡法其無盡者是謂身行又復身法因緣合會其因緣者則空無想淡然無念若此龍王是像法觀斯謂身淨又若如來身之無漏不墮三界觀身無漏如如本無以無漏身不墮三界彼無漏身能入生死其無漏際無惓捨退以無漏身示現色身如此現已亦不念滅身之法本如如來身淨衆生身淨己身亦淨等如本無是謂菩薩行應清淨何謂口言為應清淨一切賢愚言皆清淨所以者何用等相故凡夫劣勢著於音聲若信不諦憂喜無常樂於顛倒觀察衆生無本都無淫怒癡欲何則然者以諸字説聲出皆淨無欲恚愚亦無其著以此謂之一切言淨以言言之何者為言以欲恚癡而為言耶諸垢為言乎言者無著不著眼耳鼻口身心所言風像風動聲出因緣合會使有聲耳所言如響賢愚所言皆同如響所可言者不住於內亦不出外於其中間而不可得住本所念及其所行出於言者并所念想無住無想是謂龍王如來所言及其衆生一切音聲皆空非真損斯法耳曰唯世尊如來所言斯不諦耶曰是龍王如來審諦所以者何如來諦故解知諸法非真非諦又復龍王如來所言隨字音聲皆答衆生一切音聲爾故衆生亦轉法輪而亦不知法之義順以此報應使其行之隨如等滅衆苦之事曉解諸法行了如是衆生音聲已無所住在諸煩惱而常間靜現出欲言於著無著聲出所言講論談語其如法者不有違錯是謂菩薩口言清淨何謂菩薩心為清淨其心本者不可染污所以者何心本淨故其所可謂客欲垢蔽菩薩於斯不有所著了解以權於本自淨又其心行不撰德本彼德本者了識心本以此心行慈及衆生識了知彼空無我人其心德本助勸於道知等彼道觀如是者斯謂心淨以此淨心與諸淫恚愚行者俱而永不受欲怒癡垢與操行俱不著諸穢是謂菩薩身三清淨説斯清淨道品法時三萬菩薩逮補生處道無習品第三又復龍王其菩薩者乘是淨心生於欲界而在形界與諸天俱處衆梵中詳安靜然在中進止無勝動者又斯菩薩能降諸天化道以權或生形界而在欲界現如有家與諸衆生周旋坐起不與有勞弗慢衆生亦無自輕彼以斯淨諸定正受盡自為定不隨正定而有所生何則然者以彼菩薩執權方便心應淨故若此龍王菩薩曉解清淨行者當修清淨已而習道如是龍王菩薩不習以求道習不習無習以想道習亦不習於望道之習亦不求習了解道習不習所生冀向道習不習行滅而為道習亦不求習以為道習不習無習為道之習不習執捨以習道習不我人壽不身無常不身性苦不身有我不身夢幻野馬影響亦不身空無相無願不身無欲法身習道以要言旨身性諸情亦不興有十二因緣乃至老死無欲之法不數無數道無二習不俗無俗不漏無漏不犯無犯不二之習以求道習又復諸法無習之習是道無習斯謂道習不習之習如空無習亦不無習當如此習是道無習無相無願彼不作習亦非無習當作是習無𫀽不𫀽諸法無住勤習如此乃應道習當佛世尊説是清淨行無所習道品法時三萬二千天及世人悉皆逮得無所從生法樂之忍五萬天人宿不發心於菩薩者皆發無上正真道意七萬菩薩逮得法忍爾時一切同聲而言世尊其有族姓之子及族姓女逮聞説是清淨道品無習法者其值聞已心無驚恐不捨退者是皆受習如來無上正真道意得轉諸佛所轉法輪又唯世尊是輩菩薩悉獲無上正真道意為無量人分布斯法亦復當坐師子之座當於天上天下人中極師子吼猶若如今如來之吼悉降魔衆伏摧外道顯樹法幡熾法輝明震雷法鼓已鳴能降法雨爾時世尊見諸天龍神之衆人與非人又及四輩聞其至説莫不悅懌於是如來為阿耨達重復弘演而説頌云道非習可得無乃興習想其道行如此棄離習念行不望求習道蕩除衆異想其道都無習清淨像明月若有起習想無處亦不習已過無習處得致最上道道為無我念亦不與空習是道無有二安快而無上命壽亦如此無人及與言其道不有人無命亦無住諸有習道者而欲住於空斯去聖路遠是不應道習道亦無有空以捨於有習如本同一相永空空於空道為無起相亦不有滅相不起亦無滅彼悉為道習吾音譬如幻解想當如此持想行所習道當何從生道為都過俗彼不有身習亦無滅身行可得致於習是身根之家本無所演廣彼不有餘求本無不可得其習是道者當如如本無如本知本無是謂應道習諸法之本無所覺若如幻解行而致此乃應道之習若其不至道所作如不住無能止其行佛法不由道若如所習道并及與無習所演為如此以住於本無有限餘道者劣乘之所依是者無上道本乘所因由諸興此道者以致而無住斯則顯行德可致應道習道正而無嶮端直且平坦勤親行此道永離衆邪迹若如卿龍王自住其宮室不動於所處降雨充大海大士亦如是習道如所行法身而不動能滿於智海又如仁龍王在於大地上以雨遍充足其不有身著菩薩德如斯行此之所習用法滿衆生其內無所著若如阿耨達龍王大神變勝道德如是感動普十方衆生墮邪徑諸墮受著見其住是道者將順度無為已住於斯道菩薩果大稱能降魔波旬并及邪外行得道如其如如道無能動踊過諸俗法其行譬蓮花道心無有愚是行為住止千數諸衆生化度立以道以常住斯道得致於五旬神足諸感動為衆廣説法諸事悉清淨身口及與意當願賢聖道人性不可識忍行為無著其往所可至斯得如來處示道諸衆生生死於至歸斯處則如來其往似若至此為無所至衆生所可至當念彼上處學最佛之道遊樂以幻法其作是習道弘道之所習彼衆德儀行諸佛所稱歎其德無有邊終不可極盡如此習道者不習亦無住彼處不咎魔衆都不著行其順此道者不起亦無滅已得意志行總持弘大辨施惠及戒忍遂增進若海身口穢以無心潔乃清淨垢消永無瑕修應此道者得升於知達所行習深妙難動惠無即守習是道者其諸最正覺過去與當來現在亦如是致道世所歸彼已離衆難值世遭難遇永為諸佛子其聞此法者快哉諸衆生至善聞斯法真應奉如來其樂是經者有曉此道者能斷諸情態紹德具衆相得應三界將
